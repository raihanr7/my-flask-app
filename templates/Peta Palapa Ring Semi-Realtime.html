<!DOCTYPE html>
<html lang="en">
<head>
  <title>Peta Palapa Ring (Live Data)</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS dan JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; }

    #judul-peta {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 8px;
    }

    .legend {
      background: white;
      padding: 10px;
      line-height: 18px;
      font-size: 13px;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    .legend i {
      width: 18px; height: 18px;
      float: left; margin-right: 8px;
      opacity: 0.8;
    }

    #sidebar {
      position: absolute; top: 0; right: -400px;
      width: 350px; height: 100%;
      background: white;
      box-shadow: -2px 0 8px rgba(0,0,0,0.3);
      z-index: 1001;
      transition: right 0.3s ease;
      padding: 20px; overflow-y: auto;
    }
    #sidebar.open { right: 0; }
    #closeSidebar {
      position: absolute; top: 10px; right: 15px;
      background: #f44336; color: white;
      border: none; padding: 4px 8px;
      cursor: pointer; border-radius: 4px;
    }
    .label-nama {
      font-size: 11px; font-weight: bold; color: #333;
      background-color: rgba(255,255,255,0.9);
      padding: 1px 4px; border-radius: 3px;
      border: 1px solid #ccc; box-shadow: 0 0 2px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="judul-peta">Peta Palapa Ring & SKKL</div>
  <div id="map"></div>
  <div id="sidebar">
    <button id="closeSidebar">Tutup</button>
    <div id="sidebarContent"></div>
  </div>

  <script>
    // Inisialisasi peta
    const map = L.map('map', { maxBounds: [[-12,90],[7,142]], maxBoundsViscosity: 1.0 })
      .setView([-2.5,120],5);
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
      attribution:'Map data © Google', maxZoom:20
    }).addTo(map);

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    const sidebarContent = document.getElementById('sidebarContent');
    document.getElementById('closeSidebar').onclick = () => sidebar.classList.remove('open');
    map.on('click', ()=> sidebar.classList.remove('open'));

    function showSidebar(html) {
      sidebarContent.innerHTML = html;
      sidebar.classList.add('open');
    }

    // Style functions
    function styleTitik(feature) {
      let warna = "#cccccc";
      if(feature.properties.Keterangan==="Kota Interkoneksi") warna="#00bfff";
      else if(feature.properties.Keterangan==="Kota Layanan") warna="#ffff00";
      return { radius:6, fillColor:warna, color:"#000", weight:1, opacity:1, fillOpacity:0.8 };
    }
    function styleAlur(feature) {
      if(feature.properties.Description) {
        return { color:"#d3f462", weight:2, dashArray:"4 4", opacity:0.7 };
      }
      const ok = parseFloat(feature.properties["Okupansi Telkom (%)"]);
      let warna = "gray";
      if(!isNaN(ok)){
        if(ok>80) warna="red";
        else if(ok>=50) warna="yellow";
        else warna="green";
      }
      return { color:warna, weight:3, opacity:0.8 };
    }

    // Layer group
    const groupLayers = {
      PalapaRingBarat: { alur:L.layerGroup(), point:L.layerGroup(), all:L.layerGroup() },
      PalapaRingTengah: { alur:L.layerGroup(), point:L.layerGroup(), all:L.layerGroup() },
      PalapaRingTimur: { alur:L.layerGroup(), point:L.layerGroup(), all:L.layerGroup() },
      submarineCable: L.layerGroup().addTo(map)
    };

    // Base URL API
    const BASE = "https://my-flask-app-git-master-palaparingallproject.vercel.app/api";

    // Fungsi load GeoJSON + form edit okupansi
    function loadGeoJsonFromAPI(url, type, targetGroup, tableName) {
      fetch(url).then(res=>res.json()).then(data=>{
        targetGroup.clearLayers();
        const kotaMicrowave = ["Sami","Burmeso","Elelim","Wamena","Kenyam","Sumohai","Dekai","Oksibil","Kobagma","Tiom","Karubaga","Mulia","Kepi Tower","Ilaga","Sugapa"];
        const microwaveIcon = L.icon({
          iconUrl:'/static/microwave.png',
          iconSize:[24,24], iconAnchor:[12,12], popupAnchor:[0,-10]
        });

        const layer = L.geoJSON(data, {
          pointToLayer: type==="point"
            ? (f, latlng) => kotaMicrowave.includes(f.properties.Nama)
              ? L.marker(latlng,{icon:microwaveIcon})
              : L.circleMarker(latlng,styleTitik(f))
            : null,
          style: type==="alur"? styleAlur: null,
          onEachFeature(f, lyr){
            // Tabel properti
            const order = data.field_order || Object.keys(f.properties);
            let html="<table>";
            order.forEach(key=>{
              const val = f.properties[key] ?? "-";
              html+=`<tr><td><strong>${key}</strong></td><td>: ${val}</td></tr>`;
            });
            html+="</table>";

            // Tambah form edit untuk layer alur
            if(type==="alur"){
              const curr = f.properties["Okupansi Telkom (%)"] || 0;
              html+=`
                <hr>
                <label>Okupansi Telkom (%)</label>
                <input id="inp-ok" type="number" min="0" max="100" value="${curr}" style="width:100%;"/>
                <button id="btn-save" style="margin-top:8px;">Simpan</button>
              `;
            }

            lyr.on('click', e=>{
              L.DomEvent.stopPropagation(e);
              showSidebar(html);

              const btn = document.getElementById('btn-save');
              if(btn){
                btn.onclick = ()=>{
                  const newVal = document.getElementById('inp-ok').value;
                  fetch(`${BASE}/update/${tableName}/${f.properties.fid}`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({'Okupansi Telkom (%)': +newVal})
                  })
                  .then(r=>r.json())
                  .then(res=>{
                    alert(res.message||res.error);
                    sidebar.classList.remove('open');
                    refreshAllLayers();
                  })
                  .catch(err=>console.error(err));
                };
              }
            });
          }
        });
        layer.addTo(targetGroup);
      })
      .catch(err=>{
        console.error("Failed to load:",url,err);
        alert("Failed to load data: "+url);
      });
    }

    // Refresh semua layer
    function refreshAllLayers(){
      loadGeoJsonFromAPI(`${BASE}/alur/barat`,"alur", groupLayers.PalapaRingBarat.alur, "Palapa_Ring_Barat_Alur");
      loadGeoJsonFromAPI(`${BASE}/point/barat`,"point", groupLayers.PalapaRingBarat.point, "Palapa_Ring_Barat_Point");
      groupLayers.PalapaRingBarat.all.clearLayers();
      groupLayers.PalapaRingBarat.all.addLayer(groupLayers.PalapaRingBarat.alur);
      groupLayers.PalapaRingBarat.all.addLayer(groupLayers.PalapaRingBarat.point);

      loadGeoJsonFromAPI(`${BASE}/alur/tengah`,"alur", groupLayers.PalapaRingTengah.alur, "Palapa_Ring_Tengah_Alur");
      loadGeoJsonFromAPI(`${BASE}/point/tengah`,"point", groupLayers.PalapaRingTengah.point, "Palapa_Ring_Tengah_Point");
      groupLayers.PalapaRingTengah.all.clearLayers();
      groupLayers.PalapaRingTengah.all.addLayer(groupLayers.PalapaRingTengah.alur);
      groupLayers.PalapaRingTengah.all.addLayer(groupLayers.PalapaRingTengah.point);

      loadGeoJsonFromAPI(`${BASE}/alur/timur`,"alur", groupLayers.PalapaRingTimur.alur, "Palapa_Ring_Timur_Alur");
      loadGeoJsonFromAPI(`${BASE}/point/timur`,"point", groupLayers.PalapaRingTimur.point, "Palapa_Ring_Timur_Point");
      groupLayers.PalapaRingTimur.all.clearLayers();
      groupLayers.PalapaRingTimur.all.addLayer(groupLayers.PalapaRingTimur.alur);
      groupLayers.PalapaRingTimur.all.addLayer(groupLayers.PalapaRingTimur.point);

      loadGeoJsonFromAPI(`${BASE}/alur/submarine`,"alur", groupLayers.submarineCable, "SubmarineCable_Alur");
    }

    refreshAllLayers();
    setInterval(refreshAllLayers,30000);
  </script>
</body>
</html>
